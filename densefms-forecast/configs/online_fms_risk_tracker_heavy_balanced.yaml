artifacts_dir: artifacts
runs_dir: runs/online_fms_risk_tracking_0507

task:
  mode: online_current_risk
  rise_horizon_seconds: [5.0, 10.0]
  rise_thresholds: [2.0, 3.0]

data:
  default_sampling_interval: 0.5
  sampling_interval: 0.5
  calibration_seconds: 90.0
  horizon_seconds: 10.0
  recent_seconds: 10.0
  recent_window_seconds: 10.0
  use_static: false
  static_features: ["age", "gender", "mssq"]
  allow_missing_static: false
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  group_kfold: false
  group_kfold_splits: 5

model:
  head_dim: 6
  use_static: false
  static_dim: 5
  static_hidden_dim: 64
  static_dropout: 0.1
  d_model: 80
  hidden_dim: 128
  kernel_size: 3
  dropout: 0.12
  calib_dilations: [1, 2, 4, 8, 16, 32]
  transformer_layers: 2
  transformer_heads: 4
  transformer_ff_dim: 192
  pooling: mean
  fms_context_mode: calibration_history
  motion_feature_mode: norm_delta_energy
  motion_stats_branch: true
  stream_time_features: true
  stream_context_mode: gru_tcn_multiscale
  calib_summary_features: true
  state_feedback_mode: predicted_current
  ordinal_bins: [0, 2, 4, 6, 8, 10, 12, 15, 20]
  fms_combine_weight_ordinal: 0.6
  current_head_mode: dual_delta_gate
  current_delta_scale: 0.85
  risk_temporal_context: tcn
  risk_temporal_layers: 2

loss:
  type: smooth_l1
  mode: level_only
  current_reg_aux_weight: 0.6
  ordinal_loss_weight: 0.7
  risk_loss_weight: 1.25
  smoothness_weight: 0.03
  risk_pos_weight: auto

evaluation:
  high_fms_threshold: 12.0
  high_fms_caution_threshold: 8.0
  high_fms_warning_threshold: 12.0
  rapid_rise_probability_threshold: 0.5
  final_warning_mode: rapid_rise_only
  no_test_eval: true

training:
  seed: 42
  optimizer: AdamW
  learning_rate: 0.0007
  weight_decay: 0.0002
  batch_size: 64
  gradient_clip: 1.0
  epochs: 80
  patience: 10
  num_workers: 0
  selection_metric: mae
  selection_mode: min
